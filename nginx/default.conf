server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;
  server_tokens off;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml
    application/rss+xml
    image/svg+xml;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; manifest-src 'self'; upgrade-insecure-requests" always;

  location = /healthz {
    access_log off;
    return 204;
  }

  location = /robots.txt {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=3600" always;
  }

  location = /sitemap.xml {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=3600" always;
  }

  location /_next/static/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location ~* \.(?:css|js|mjs|json|png|jpg|jpeg|gif|webp|avif|ico|svg|woff2?)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
  }

  location ~ /\.(?!well-known) {
    deny all;
  }

  error_page 404 /404.html;

  location / {
    try_files $uri $uri/ =404;
  }
}
