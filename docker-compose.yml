services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://www.tekyon.ru}
    image: tekyon-site:latest
    container_name: tekyon-site
    restart: unless-stopped
    ports:
      - "${APP_HOST:-127.0.0.1}:${APP_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
