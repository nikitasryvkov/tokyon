server {
  listen 80;
  listen [::]:80;
  server_name tekyon.ru www.tekyon.ru;

  return 301 https://www.tekyon.ru$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name tekyon.ru;

  ssl_certificate /etc/letsencrypt/live/www.tekyon.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.tekyon.ru/privkey.pem;

  return 301 https://www.tekyon.ru$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.tekyon.ru;

  ssl_certificate /etc/letsencrypt/live/www.tekyon.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.tekyon.ru/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000" always;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
